<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Grid Builder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Word Grid Builder</h1>
    
    <div class="controls">
        <h3>Grid Configuration</h3>
        <p class="info-text">Enter letters in each cell and set values, node multipliers, and path multipliers</p>
        <button class="done-btn" onclick="collectGridData()">Done - Collect Grid Data</button>
        <button class="reset-btn" onclick="resetGrid()">Reset Grid</button>
    </div>
    
    <div class="grid-container" id="grid"></div>
    
    <div class="grid-data">
        <h3>Grid Data (JSON Format)</h3>
        <pre id="gridOutput">Grid data will appear here after clicking "Done"</pre>
    </div>

    <script src="code.js"></script>
</body>
</html>
